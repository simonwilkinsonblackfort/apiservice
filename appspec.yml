version: 0.0
os: linux
files:
  - source: /
    destination: /app/apiservice
    overwrite: true
permissions:
  - object: /app/apiservice
    owner: ubuntu
    group: ubuntu
    mode: "755"
    type:
      - directory
  - object: /app/apiservice/scripts
    owner: ubuntu
    group: ubuntu
    mode: "755"
    type:
      - file
hooks:
  BeforeInstall:
    - location: scripts/stop_server.sh
      timeout: 30
      runas: root
  AfterInstall:
    - location: scripts/install_deps.sh
      timeout: 300
      runas: ubuntu
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60
      runas: ubuntu
  ValidateService:
    - location: scripts/validate.sh
      timeout: 30
      runas: ubuntu
